version: '3.8'

services:
  # ─── Database for Kitchen Helper ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kitchen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kitchen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitchen_pass}
      POSTGRES_DB: ${POSTGRES_DB:-kitchen_helper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kitchen_user} -d ${POSTGRES_DB:-kitchen_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kitchen_user}:${POSTGRES_PASSWORD:-kitchen_pass}@postgres:5432/${POSTGRES_DB:-kitchen_helper}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_API_RESOURCE: ${LOGTO_API_RESOURCE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-EUR}
    expose:
      - "8000"

  # ─── Frontend (nginx + SPA) ─────────────────────────────────────────────────
  # Expose via Coolify: homebud.net → port 80
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-}
        VITE_LOGTO_API_RESOURCE: ${VITE_LOGTO_API_RESOURCE:-}
    container_name: kitchen_frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  postgres_data:
